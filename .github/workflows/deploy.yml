name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'src/worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy src/worker.js --name chop-mvp

      - name: Get deployment URL
        run: echo "Deployed to https://chop-mvp.cloudflare-rake998.workers.dev"
